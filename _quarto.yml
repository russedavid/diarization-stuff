ipynb-filters: [nbdev_filter]

project:
  type: website
  output-dir: _docs
  preview:
    port: 3000
    browser: false

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 4

website:
  title: "diarization-stuff"
  site-url: "https://russedavid.github.io/diarization-stuff"
  description: "a repository for diarization related code and walkthroughs"
  twitter-card: true
  open-graph: true
  repo-branch: master
  repo-url: "https://github.com/russedavid/diarization-stuff"
  repo-actions: [issue]
  navbar:
    background: primary
    search: true
    right:
      - icon: github
        href: "https://github.com/russedavid/diarization-stuff"
  sidebar:
    style: "floating"

metadata-files: 
  - sidebar.yml
  - custom.yml
